name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v24
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build wheels with full optimizations
      run: |
        nix-shell --run "maturin build --release --strip --out dist"
      env:
        RUSTFLAGS: "-C target-cpu=native -C opt-level=3 -C codegen-units=1 -C lto=fat"

    - name: Upload wheels as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: dist/

  test:
    name: Test built wheels
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v24
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download Linux wheels
      uses: actions/download-artifact@v4
      with:
        name: wheels-ubuntu-latest
        path: dist/

    - name: Test wheel installation and import
      run: |
        nix-shell --run "
          pip install dist/*.whl
          python -c 'import xschemoptimizer; print(\"Import successful\")'
          python -c 'from xschemoptimizer import optimize_circuit; print(\"Function import successful\")'
        "

  create-source-dist:
    name: Create source distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v24
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build source distribution
      run: |
        nix-shell --run "maturin sdist --out dist"

    - name: Upload source distribution
      uses: actions/upload-artifact@v4
      with:
        name: source-dist
        path: dist/

  publish:
    name: Publish to PyPI
    needs: [build, test, create-source-dist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    environment:
      name: pypi
      url: https://pypi.org/project/xschemoptimizer/

    steps:
    - name: Download all wheels
      uses: actions/download-artifact@v4
      with:
        path: dist-download/

    - name: Flatten downloaded artifacts
      run: |
        mkdir -p dist
        find dist-download -name "*.whl" -exec cp {} dist/ \;
        find dist-download -name "*.tar.gz" -exec cp {} dist/ \;
        ls -la dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: dist/

  publish-test-pypi:
    name: Publish to Test PyPI
    needs: [build, test, create-source-dist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'  # Only on manual trigger
    environment:
      name: test-pypi
      url: https://test.pypi.org/project/xschemoptimizer/

    steps:
    - name: Download all wheels
      uses: actions/download-artifact@v4
      with:
        path: dist-download/

    - name: Flatten downloaded artifacts
      run: |
        mkdir -p dist
        find dist-download -name "*.whl" -exec cp {} dist/ \;
        find dist-download -name "*.tar.gz" -exec cp {} dist/ \;
        ls -la dist/

    - name: Publish to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/
